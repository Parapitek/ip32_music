{% extends "base.html" %}
{% block title %}Жанры{% endblock title %}
{% block content %}
    <table>
        <!-- шапка таблицы -->
         <thead>
            <tr>
                <th>№</th>
                <th>Название</th>
                <th>Название на англ.</th>
                <th>Описание</th>
                <th></th>
                <th></th>
            </tr>
         </thead>
         <!-- тело таблицы -->
          <tbody>
                {% for g in genres %}
                    <tr>
                        <td>{{g.id}}</td>
                        <td>{{g.name_ru}}</td>
                        <td>{{g.name_en}}</td>
                        <td>{{g.description}}</td>
                        <td><a href="/editgenre/{{g.id}}">Редактировать</a></td>
                        <td><a href="/deletegenre/{{g.id}}">Удалить</a></td>
                    </tr>
                {% endfor %}
          </tbody>
    </table>
    <a href="/add_genre">Добавить жанр</a>
{% endblock content %}
